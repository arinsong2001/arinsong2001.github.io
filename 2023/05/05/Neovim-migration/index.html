      <h3 id="将Neovim配置迁移至lazy-nvim"><a href="#将Neovim配置迁移至lazy-nvim" class="headerlink" title="将Neovim配置迁移至lazy.nvim"></a>将Neovim配置迁移至lazy.nvim</h3><p>创建配置文件夹：</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">mkdir -p ~/.config/nvim</span><br></pre></td></tr></table></figure>

<p>进入文件夹并编写配置文件：</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">cd ~/.config/nvim</span><br><span class="line">nvim init.lua</span><br></pre></td></tr></table></figure>

<p><code>init.lua</code>:</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br></pre></td><td class="code"><pre><span class="line">-- text settings</span><br><span class="line">vim.opt.expandtab = true</span><br><span class="line">vim.opt.softtabstop = 4</span><br><span class="line">vim.opt.shiftwidth = 4</span><br><span class="line">vim.opt.autoindent = true</span><br><span class="line">vim.opt.smartindent = true</span><br><span class="line"></span><br><span class="line">-- syntax settings</span><br><span class="line">vim.opt.number = true</span><br><span class="line">vim.cmd(&#x27;syntax on&#x27;)</span><br><span class="line"></span><br><span class="line">-- interaction settings</span><br><span class="line">vim.opt.mouse:append(&#x27;a&#x27;)</span><br><span class="line">vim.opt.clipboard:append(&#x27;unnamed&#x27;)</span><br><span class="line"></span><br><span class="line">-- searching settings</span><br><span class="line">vim.opt.ignorecase = true</span><br><span class="line">vim.opt.smartcase = true</span><br><span class="line"></span><br><span class="line">-- keymaps</span><br><span class="line">vim.keymap.set(&#x27;n&#x27;, &#x27;t&#x27;, &#x27;:NvimTreeFindFileToggle&lt;CR&gt;&#x27;)</span><br><span class="line">vim.keymap.set(&#x27;n&#x27;, &#x27;T&#x27;, &#x27;:NvimTreeFindFileToggle&lt;CR&gt;&#x27;)</span><br><span class="line"></span><br><span class="line">-- lazy.nvim bootstrap</span><br><span class="line">local lazypath = vim.fn.stdpath(&quot;data&quot;) .. &quot;/lazy/lazy.nvim&quot;</span><br><span class="line">if not vim.loop.fs_stat(lazypath) then</span><br><span class="line">  vim.fn.system(&#123;</span><br><span class="line">    &quot;git&quot;,</span><br><span class="line">    &quot;clone&quot;,</span><br><span class="line">    &quot;--filter=blob:none&quot;,</span><br><span class="line">    &quot;https://github.com/folke/lazy.nvim.git&quot;,</span><br><span class="line">    &quot;--branch=stable&quot;, -- latest stable release</span><br><span class="line">    lazypath,</span><br><span class="line">  &#125;)</span><br><span class="line">end</span><br><span class="line">vim.opt.rtp:prepend(lazypath)</span><br><span class="line"></span><br><span class="line">-- plugins</span><br><span class="line">require(&quot;lazy&quot;).setup &#123;</span><br><span class="line">  &#123;</span><br><span class="line">    &#x27;folke/tokyonight.nvim&#x27;,</span><br><span class="line">    priority = 1000,</span><br><span class="line">    config = function()</span><br><span class="line">      vim.cmd(&#x27;colorscheme tokyonight&#x27;)</span><br><span class="line">    end,</span><br><span class="line">  &#125;,</span><br><span class="line"></span><br><span class="line">  &#123;</span><br><span class="line">    &#x27;nvim-lualine/lualine.nvim&#x27;,</span><br><span class="line">    dependencies = &#123; &#x27;nvim-tree/nvim-web-devicons&#x27; &#125;,</span><br><span class="line">    config = function()</span><br><span class="line">      require(&#x27;lualine&#x27;).setup &#123; options = &#123; theme = &#x27;auto&#x27; &#125; &#125;</span><br><span class="line">    end,</span><br><span class="line">  &#125;,</span><br><span class="line"></span><br><span class="line">  &#123;</span><br><span class="line">    &#x27;nvim-tree/nvim-tree.lua&#x27;,</span><br><span class="line">    dependencies = &#123; &#x27;nvim-tree/nvim-web-devicons&#x27; &#125;,</span><br><span class="line">    config = function()</span><br><span class="line">      vim.g.loaded_netrw = 1</span><br><span class="line">      vim.g.loaded_netrwPlugin = 1</span><br><span class="line">      require(&quot;nvim-tree&quot;).setup()</span><br><span class="line">    end,</span><br><span class="line">  &#125;,</span><br><span class="line"></span><br><span class="line">  &#123;</span><br><span class="line">    &#x27;nvim-treesitter/nvim-treesitter&#x27;,</span><br><span class="line">    build = &#x27;:TSUpdate&#x27;,</span><br><span class="line">    config = function()</span><br><span class="line">      require&#x27;nvim-treesitter.configs&#x27;.setup &#123;</span><br><span class="line">        auto_install = true,</span><br><span class="line">        highlight = &#123; enable = true &#125;</span><br><span class="line">      &#125;</span><br><span class="line">    end,</span><br><span class="line">  &#125;,</span><br><span class="line"></span><br><span class="line">  &#123;</span><br><span class="line">    &#x27;windwp/nvim-autopairs&#x27;,</span><br><span class="line">    config = function()</span><br><span class="line">      require(&#x27;nvim-autopairs&#x27;).setup()</span><br><span class="line">    end,</span><br><span class="line">  &#125;,</span><br><span class="line"></span><br><span class="line">  &#123;</span><br><span class="line">    &#x27;neoclide/coc.nvim&#x27;,</span><br><span class="line">    branch = &#x27;release&#x27;,</span><br><span class="line">    config = function()</span><br><span class="line">      vim.opt.updatetime = 300</span><br><span class="line">      vim.opt.signcolumn = &quot;yes&quot;</span><br><span class="line">      vim.cmd(&#x27;highlight SignColumn guibg=none ctermbg=none&#x27;)</span><br><span class="line">      local keyset = vim.keymap.set</span><br><span class="line">      local opts = &#123; silent = true, noremap = true, expr = true, replace_keycodes = false &#125;</span><br><span class="line">      keyset(&quot;i&quot;, &quot;&lt;C-j&gt;&quot;, [[coc#pum#visible() ? coc#pum#next(1) : &quot;\&lt;C-j&gt;&quot;]], opts)</span><br><span class="line">      keyset(&quot;i&quot;, &quot;&lt;C-k&gt;&quot;, [[coc#pum#visible() ? coc#pum#prev(1) : &quot;\&lt;C-k&gt;&quot;]], opts)</span><br><span class="line">      keyset(&quot;i&quot;, &quot;&lt;TAB&gt;&quot;, [[coc#pum#visible() ? coc#pum#confirm() : &quot;&lt;TAB&gt;&quot;]], opts)</span><br><span class="line">    end,</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
